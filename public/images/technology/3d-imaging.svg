<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e4fdef"/>
      <stop offset="100%" stop-color="#d3f1ec"/>
    </linearGradient>
  </defs>
  <rect width="300" height="300" fill="url(#bg6)"/>
  <circle cx="150" cy="150" r="95" fill="#ffffff" opacity="0.5"/>
  <!-- stacked scan layers (isometric) -->
  <path d="M150 90 L210 118 L150 146 L90 118 Z" fill="#a2dcd4"/>
  <path d="M150 122 L210 150 L150 178 L90 150 Z" fill="#2a9d8f"/>
  <path d="M150 154 L210 182 L150 210 L90 182 Z" fill="#163b57"/>
  <!-- vertical connector lines -->
  <line x1="90" y1="118" x2="90" y2="182" stroke="#7a98ad" stroke-width="2"/>
  <line x1="210" y1="118" x2="210" y2="182" stroke="#7a98ad" stroke-width="2"/>
  <!-- crosshair target -->
  <circle cx="150" cy="150" r="22" fill="none" stroke="#ffffff" stroke-width="3"/>
  <line x1="150" y1="118" x2="150" y2="182" stroke="#ffffff" stroke-width="2"/>
  <line x1="118" y1="150" x2="182" y2="150" stroke="#ffffff" stroke-width="2"/>
</svg>
